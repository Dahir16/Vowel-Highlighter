<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Google material icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <title>Vowel Highlighter</title>
    <link rel="stylesheet" href="css/index.css"/>
    <link rel="stylesheet" href="css/theme.css"/>
</head>
<body>
  <div class="vowel_highlighter">
    <div class="vowel_container">
    <h2>Vowel Highlighter</h2>
    <input type="text" id="textInput" placeholder="Type something...">
    <div id="result">
      <div class="content" id="output"></div>
    </div>
    <div class="counters">
      <div class="letterCount">Letters: <span id="letterCount">0</span></div>
      <div class="consonantCount">Consonants: <span id="consonantCount">0</span></div>
      <div class="vowelCount">Vowels: <span id="vowelCount">0</span></div>
    </div>
  </div> 
  </div>

  <script src="index.js"></script>

</body>
</html>
